<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Typuj wyniki meczów piłkarskich ze znajomymi." />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <!-- Fonts (Roboto) and Font Awesome are self-hosted and imported from src/main.tsx
         (see @fontsource/roboto and @fortawesome/fontawesome-free) — no CDN. -->

    <!-- PWA / installability. The web app manifest link is injected at build time by
         vite-plugin-pwa; these tags cover iOS Safari, which ignores most of it. -->
    <meta name="theme-color" content="#12A751" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- `default` (not black-translucent): iOS reserves the status-bar area so the
         green top nav starts below it. black-translucent would let the clock/battery
         overlay the header, since we don't set viewport-fit=cover + safe-area insets. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Typerek" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <title>Typerek</title>

    <!-- Anti-FOUC: apply the cached colour theme before the app loads so dark mode
         doesn't flash light on every navigation. Mirrors src/lib/theme.ts (kept tiny
         and dependency-free); the React app re-applies and keeps it in sync after. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('typerek.theme') || 'light'
          var dark = pref === 'dark'
          if (pref === 'auto') {
            var h = new Date().getHours()
            dark = h >= 20 || h < 7
          }
          if (dark) {
            document.documentElement.classList.add('dark')
            var meta = document.querySelector('meta[name="theme-color"]')
            if (meta) meta.setAttribute('content', '#0F3D27')
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
