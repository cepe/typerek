openapi: 3.0.3

# ─────────────────────────────────────────────────────────────────────────────
# Typerek API — CONTRACT (source of truth).
#
# This file freezes the behavior of the current application as a JSON/REST API.
# It is implemented first by the Rails backend (Phase 1 of the plan) and, with no
# changes on the frontend side, eventually by a Java Spring Boot backend
# (Phase 4). The frontend depends ONLY on this contract, never on the backend
# technology.
#
# Conventions:
#  • Path versioning: /api/v1.
#  • Authentication: JWT (Authorization: Bearer <token>).
#  • Dates/times: ISO 8601 in UTC — formatting happens on the frontend.
#  • Domain logic (points, ranking, bet locking, authorization) stays on the
#    backend; the frontend only renders.
# ─────────────────────────────────────────────────────────────────────────────

info:
  title: Typerek API
  version: 1.0.0
  description: >
    Match-prediction API. Mirrors the current Rails application 1:1 (login,
    matches, betting, ranking, invitations) as a JSON/REST API.

servers:
  - url: /api/v1

tags:
  - name: Auth
    description: Login and logout (JWT)
  - name: Profile
    description: The signed-in user
  - name: Matches
    description: Match list, details, betting and admin edits
  - name: Ranking
    description: Participant standings
  - name: Users
    description: Invitation/user management (admin) and profiles
  - name: Invitations
    description: Invitation acceptance (token-based sign-up)

paths:
  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Log in — returns a JWT
      description: Equivalent of SessionsController#create. Public.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResult' }
        '401':
          description: Invalid username or password
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      description: >
        Equivalent of SessionsController#destroy. With a stateless JWT the token
        is discarded on the client; the endpoint exists for symmetry / a possible
        revocation list.
      responses:
        '204': { description: Logged out }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── Profile ─────────────────────────────────────────────────────────────────
  /me:
    get:
      tags: [Profile]
      summary: The signed-in user + ranking standing
      description: >
        Feeds the application header (username, position and points). Matches the
        data from shared/_menu and the current_user_standing helper.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CurrentUser' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── Matches ──────────────────────────────────────────────────────────────────
  /matches:
    get:
      tags: [Matches]
      summary: Match list (not finished + finished)
      description: >
        Equivalent of MatchesController#index. `not_finished` are matches without
        a complete result (ascending by start), `finished` are matches with a
        result (descending). `my_answer` holds the signed-in user's bet for a match.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MatchList' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /matches/{id}:
    parameters:
      - { $ref: '#/components/parameters/MatchId' }
    get:
      tags: [Matches]
      summary: Match details
      description: >
        Equivalent of MatchesController#show. Once the match has started
        (`started=true`) it also returns `participants` — every active
        participant's bet.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MatchDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Matches]
      summary: Edit a match (admin only)
      description: >
        Equivalent of MatchesController#update (Typerek::UpdateMatch). Allows
        changing team names, odds, start time and the result.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MatchUpdateRequest' }
      responses:
        '200':
          description: Changes saved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MatchDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /matches/{id}/bet:
    parameters:
      - { $ref: '#/components/parameters/MatchId' }
    put:
      tags: [Matches]
      summary: Place / change a bet on a match
      description: >
        Equivalent of MatchesController#set_type (Typerek::MakeBet). Upserts the
        signed-in user's bet. The backend rejects bets after kickoff (422) and
        invalid bet types (422).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BetRequest' }
      responses:
        '200':
          description: Bet saved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Answer' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: Match already started or invalid bet type
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ── Ranking ──────────────────────────────────────────────────────────────────
  /ranking:
    get:
      tags: [Ranking]
      summary: Participant standings
      description: >
        Equivalent of RankingsController#show. Ordering: points descending, ties
        broken by username ascending. `position` is shared for equal point totals
        (e.g. 1, 1, 3).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RankingEntry' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── Users / Invitation admin ──────────────────────────────────────────────────
  /users:
    get:
      tags: [Users]
      summary: User list (admin only)
      description: Equivalent of UsersController#index. Ordered by username.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Users]
      summary: Create an invitation (admin only)
      description: >
        Equivalent of UsersController#create (Typerek::CreateInvitation). Creates
        a password-less account and returns a one-time activation link.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InvitationCreateRequest' }
      responses:
        '201':
          description: Account created + activation link
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvitationCreated' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /users/{id}:
    parameters:
      - { $ref: '#/components/parameters/UserId' }
    get:
      tags: [Users]
      summary: User profile — their bets on started matches
      description: >
        Equivalent of UsersController#show. Returns the number of correct bets and
        the user's bets on matches that have already started.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Users]
      summary: Delete a user (admin only)
      description: Equivalent of UsersController#destroy.
      responses:
        '204': { description: User deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /users/{id}/resend-invitation:
    parameters:
      - { $ref: '#/components/parameters/UserId' }
    post:
      tags: [Users]
      summary: Generate a new invitation link (admin only)
      description: Equivalent of UsersController#resend_invitation.
      responses:
        '200':
          description: New activation link
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvitationCreated' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /users/{id}/fin:
    parameters:
      - { $ref: '#/components/parameters/UserId' }
    patch:
      tags: [Users]
      summary: Toggle the confirmation flag (admin only)
      description: Equivalent of UsersController#fin — toggles the `fin` field.
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── Invitations (public, token-based) ──────────────────────────────────────────
  /invitations/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema: { type: string }
        description: Signed invitation token (valid for 24 h).
    get:
      tags: [Invitations]
      summary: Validate an invitation token
      description: >
        Equivalent of InvitationsController#show. Public. Returns the username
        bound to the token so the frontend can show the set-password form.
      security: []
      responses:
        '200':
          description: Token valid
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvitationInfo' }
        '404':
          description: Invalid or expired token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /invitations/{token}/accept:
    parameters:
      - name: token
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [Invitations]
      summary: Accept an invitation — set the password and log in
      description: >
        Equivalent of InvitationsController#update (User#accept_invitation). Sets
        the password, marks the account active and returns a JWT (auto-login).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InvitationAcceptRequest' }
      responses:
        '200':
          description: Invitation accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResult' }
        '404':
          description: Invalid token / unknown username
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

# ─────────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    MatchId:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    UserId:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }

  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Not allowed (admin-only action)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    BetType:
      type: string
      description: >
        The six bet types: 1 (win_a), X (tie), 2 (win_b), 1X (win_tie_a),
        X2 (win_tie_b), 12 (not_tie).
      enum: [win_a, tie, win_b, win_tie_a, win_tie_b, not_tie]

    Odds:
      type: object
      description: Odds for the six bet types (may be empty before they are set).
      properties:
        win_a: { type: number, format: double, nullable: true }
        tie: { type: number, format: double, nullable: true }
        win_b: { type: number, format: double, nullable: true }
        win_tie_a: { type: number, format: double, nullable: true }
        win_tie_b: { type: number, format: double, nullable: true }
        not_tie: { type: number, format: double, nullable: true }
      required: [win_a, tie, win_b, win_tie_a, win_tie_b, not_tie]

    LoginRequest:
      type: object
      properties:
        username: { type: string }
        password: { type: string, format: password }
      required: [username, password]

    AuthResult:
      type: object
      description: JWT + the signed-in user.
      properties:
        token: { type: string, description: JWT for the Authorization header }
        user: { $ref: '#/components/schemas/CurrentUser' }
      required: [token, user]

    Standing:
      type: object
      description: Ranking standing (as shown in the app header).
      nullable: true
      properties:
        rank: { type: integer, nullable: true }
        points: { type: number, format: double }
      required: [rank, points]

    CurrentUser:
      type: object
      properties:
        id: { type: integer, format: int64 }
        username: { type: string }
        admin: { type: boolean }
        standing: { $ref: '#/components/schemas/Standing' }
      required: [id, username, admin]

    User:
      type: object
      description: A user on the admin list.
      properties:
        id: { type: integer, format: int64 }
        username: { type: string }
        admin: { type: boolean }
        active:
          type: boolean
          description: Whether the invitation has been accepted (invitation_accepted_at != null).
        fin:
          type: boolean
          description: Confirmation flag (e.g. payment).
        invited_by:
          type: string
          nullable: true
          description: Username of the inviter.
      required: [id, username, admin, active, fin, invited_by]

    Participant:
      type: object
      description: A single participant's bet for a match (visible once it has started).
      properties:
        user:
          type: object
          properties:
            id: { type: integer, format: int64 }
            username: { type: string }
          required: [id, username]
        result:
          allOf: [{ $ref: '#/components/schemas/BetType' }]
          nullable: true
          description: The chosen bet, or null ("no bet").
      required: [user, result]

    Match:
      type: object
      description: A match on the list.
      properties:
        id: { type: integer, format: int64 }
        team_a: { type: string }
        team_b: { type: string }
        team_a_flag:
          type: string
          nullable: true
          description: ISO flag code (e.g. "pl", "gb-eng") or null for an unknown team.
        team_b_flag: { type: string, nullable: true }
        start: { type: string, format: date-time, description: Kickoff time (ISO 8601, UTC). }
        started: { type: boolean }
        finished: { type: boolean, description: Whether the match has a complete result. }
        result_a: { type: integer, nullable: true }
        result_b: { type: integer, nullable: true }
        odds: { $ref: '#/components/schemas/Odds' }
        my_answer:
          allOf: [{ $ref: '#/components/schemas/BetType' }]
          nullable: true
          description: The signed-in user's bet for this match (or null).
      required:
        [id, team_a, team_b, team_a_flag, team_b_flag, start, started, finished,
         result_a, result_b, odds, my_answer]

    MatchDetail:
      allOf:
        - { $ref: '#/components/schemas/Match' }
        - type: object
          properties:
            participants:
              type: array
              nullable: true
              description: Participants' bets — present only when `started=true`.
              items: { $ref: '#/components/schemas/Participant' }

    MatchList:
      type: object
      properties:
        not_finished:
          type: array
          items: { $ref: '#/components/schemas/Match' }
        finished:
          type: array
          items: { $ref: '#/components/schemas/Match' }
      required: [not_finished, finished]

    MatchUpdateRequest:
      type: object
      description: Fields editable by an admin (all optional).
      properties:
        team_a: { type: string }
        team_b: { type: string }
        start: { type: string, format: date-time }
        win_a: { type: number, format: double }
        tie: { type: number, format: double }
        win_b: { type: number, format: double }
        win_tie_a: { type: number, format: double }
        win_tie_b: { type: number, format: double }
        not_tie: { type: number, format: double }
        result_a: { type: integer }
        result_b: { type: integer }

    BetRequest:
      type: object
      properties:
        result: { $ref: '#/components/schemas/BetType' }
      required: [result]

    Answer:
      type: object
      description: The signed-in user's bet on a match.
      properties:
        match_id: { type: integer, format: int64 }
        result: { $ref: '#/components/schemas/BetType' }
      required: [match_id, result]

    RankingEntry:
      type: object
      properties:
        position:
          type: integer
          description: Position; shared for equal point totals.
        user:
          type: object
          properties:
            id: { type: integer, format: int64 }
            username: { type: string }
          required: [id, username]
        points: { type: number, format: double }
        accuracy: { type: integer, description: Number of correct bets. }
      required: [position, user, points, accuracy]

    UserProfile:
      type: object
      description: A user's profile with their bets on started matches.
      properties:
        user:
          type: object
          properties:
            id: { type: integer, format: int64 }
            username: { type: string }
            accuracy: { type: integer }
          required: [id, username, accuracy]
        started_matches:
          type: array
          items:
            allOf:
              - { $ref: '#/components/schemas/Match' }
              - type: object
                properties:
                  answer:
                    allOf: [{ $ref: '#/components/schemas/BetType' }]
                    nullable: true
                    description: This user's bet for the match.
      required: [user, started_matches]

    InvitationCreateRequest:
      type: object
      properties:
        username: { type: string }
      required: [username]

    InvitationCreated:
      type: object
      description: Result of creating / resending an invitation.
      properties:
        user: { $ref: '#/components/schemas/User' }
        token: { type: string }
        url:
          type: string
          format: uri
          description: Ready-to-copy activation link.
      required: [user, token, url]

    InvitationInfo:
      type: object
      properties:
        username: { type: string, description: Username bound to the token. }
      required: [username]

    InvitationAcceptRequest:
      type: object
      properties:
        password: { type: string, format: password, minLength: 6 }
        password_confirmation: { type: string, format: password }
      required: [password, password_confirmation]

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string, description: Error code (e.g. invalid_credentials). }
            message: { type: string, description: User-facing message. }
            fields:
              type: object
              nullable: true
              additionalProperties:
                type: array
                items: { type: string }
              description: Per-field validation errors (optional).
          required: [code, message]
      required: [error]

security:
  - bearerAuth: []
