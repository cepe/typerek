# Polish attribute names so ActiveRecord validation messages read naturally
# (e.g. "Hasło jest za krótkie"). The message templates themselves come from the
# rails-i18n gem; the API emits no other localized strings (dates/numbers are
# formatted client-side).
pl:
  activerecord:
    attributes:
      user:
        username: Login
        password: Hasło
        password_confirmation: Powtórz hasło
